version: "3.9"

services:
  client:
    build: ./client
    container_name: mern_client
    restart: always
    ports:
      - "3000:5173"
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app 
      - /app/node_modules
    depends_on:
      - server

  server:
    build: ./server
    container_name: mern_server
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app 
      - /app/node_modules