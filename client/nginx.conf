# nginx.conf (Update this file in your client directory)
user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Our custom server block starts here
    server {
        listen 80;
        
        # Block 1: Assets with Cache Control
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            try_files $uri =404;
        }

        # CRITICAL ROOT LOCATION FIX
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # Header fixes
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            
            # THE GUARANTEED SPA FALLBACK
            try_files $uri $uri/ /index.html; 
        }
    }
}