name: Monorepo Deploy to ECS

on:
  push:
    branches:
      # Workflow now runs ONLY when code is pushed to this specific branch.
      - feature_actions_dep 
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 437639821200
  # ECR Repository Names
  ECR_CLIENT_REPO: mern/texteditor-client-ga
  ECR_SERVER_REPO: mern/texteditor-server-ga
  # ECS Details
  ECS_SERVICE: task_definition_mern_texteditor-github-actions-service-bq6mprnq # Use your service name
  ECS_CLUSTER: mern-TextEditor-Cluster-GitHubActions # Use your cluster name
  ECS_TASK_DEF_PATH: .aws/task-definition.json
  # Container Names in Task Definition
  CONTAINER_NAME_CLIENT: mern-texteditor-client-container
  CONTAINER_NAME_SERVER: mern-texteditor-server-container

permissions:
  contents: read

jobs:
    build-client:
        runs-on: ubuntu-latest
        outputs:
          image: ${{ steps.build-image.outputs.image }}
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Set Image Tag and URI
          id: set-tag-client
          run: |
            SHORT_SHA=$(git rev-parse --short HEAD)
            FULL_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_CLIENT_REPO}}:${SHORT_SHA}"
            echo "ECR_CLIENT_IMAGE_URI=$FULL_URI" >> $GITHUB_OUTPUT

        - name: Build and push Client image
          id: build-image
          run: |
            IMAGE_URI=${{ steps.set-tag-client.outputs.ECR_CLIENT_IMAGE_URI }}
            
            docker build \
                --build-arg VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL_VALUE }} \
                -t $IMAGE_URI \
                ./client
            docker push $IMAGE_URI
            echo "Client Image pushed to ECR: $IMAGE_URI"
    
    build-server:
        runs-on: ubuntu-latest
        outputs:
          image: ${{ steps.build-image.outputs.image }}
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Set Image Tag and URI
          id: set-tag-server
          run: |
            SHORT_SHA=$(git rev-parse --short HEAD)
            FULL_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_SERVER_REPO}}:${SHORT_SHA}"
            echo "ECR_SERVER_IMAGE_URI=$FULL_URI" >> $GITHUB_OUTPUT

        - name: Build and push Client image
          id: build-image
          run: |
            IMAGE_URI=${{ steps.set-tag-server.outputs.ECR_SERVER_IMAGE_URI }}
            
            docker build \
                -t $IMAGE_URI \
                ./server
            docker push $IMAGE_URI
            echo "Server Image pushed to ECR: $IMAGE_URI"
    
    deploy:
      needs: [build-client, build-server] # Waits for both builds
      runs-on: ubuntu-latest
      
      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Task Definition (Inject Images and Secrets)
        id: render-task-def
        env:
          CLIENT_IMAGE: ${{ needs.build-client.outputs.ECR_CLIENT_IMAGE_URI }}
          SERVER_IMAGE: ${{ needs.build-server.outputs.ECR_SERVER_IMAGE_URI }}
        run: |
          # Install jq for JSON processing
          sudo apt-get install jq -y
          
          # Load the template
          TASK_DEF=$(cat ${{ env.ECS_TASK_DEF_PATH }})
          
          # Update Client Image
          TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$CLIENT_IMAGE" --arg NAME "$CONTAINER_NAME_CLIENT" \
            '.containerDefinitions[] |= if .name == $NAME then .image = $IMAGE else . end')

          echo "Client Image received to ECR: $CLIENT_IMAGE"
          echo "Server Image received to ECR: $SERVER_IMAGE"

          # Update Server Image AND Inject Secrets into Server Environment
          TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$SERVER_IMAGE" --arg NAME "$CONTAINER_NAME_SERVER" \
            --arg DB_URL "${{ secrets.DB_URL_VALUE }}" \
            --arg CLIENT_URL "${{ secrets.CLIENT_URL_VALUE }}" \
            --arg JWT_SECRET "${{ secrets.JWT_SECRET_VALUE }}" \
            --arg GEMINI_KEY "${{ secrets.GEMINI_API_KEY_VALUE }}" \
            '.containerDefinitions[] |= if .name == $NAME then 
                .image = $IMAGE | 
                .environment |= map(
                  # Check for all five secrets 
                  if .name == "db_url" then .value = $DB_URL
                  elif .name == "CLIENT_URL" then .value = $CLIENT_URL
                  elif .name == "jwt_secret" then .value = $JWT_SECRET
                  elif .name == "GEMINI_API_KEY" then .value = $GEMINI_KEY
                  else . end
                )
             else . end')
          
          # Write the final task definition to a file
          echo "$TASK_DEF" > task-def-final.json
          echo "task-def-path=task-def-final.json" >> $GITHUB_OUTPUT

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-def-path }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true