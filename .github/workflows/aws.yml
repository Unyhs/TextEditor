name: Monorepo Deploy to ECS

on:
  push:
    branches:
      # Workflow now runs ONLY when code is pushed to this specific branch.
      - feature_actions_dep 
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

env:
  AWS_REGION: ap-south-1
  # ECR Repository Names
  ECR_CLIENT_REPO: mern/texteditor-client-ga
  ECR_SERVER_REPO: mern/texteditor-server-ga
  # ECS Details
  ECS_SERVICE: task_definition_mern_texteditor-github-actions # Use your service name
  ECS_CLUSTER: task_definition_mern_texteditor-github-actions # Use your cluster name
  ECS_TASK_DEF_PATH: .aws/task-definition.json
  # Container Names in Task Definition
  CONTAINER_NAME_CLIENT: mern-texteditor-client-container
  CONTAINER_NAME_SERVER: mern-texteditor-server-container

permissions:
  contents: read

jobs:
    build-client:
        runs-on: ubuntu-latest
        outputs:
          image: ${{ steps.build-image.outputs.image }}
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, tag, and push Client image
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            IMAGE_URI=$ECR_REGISTRY/$ECR_CLIENT_REPO:$IMAGE_TAG
            
            docker build \
                --build-arg VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL_VALUE }} \
                -t $IMAGE_URI \
                ./client
            docker push $IMAGE_URI
            echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
    
    build-server:
        runs-on: ubuntu-latest
        outputs:
          image: ${{ steps.build-image.outputs.image }}
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, tag, and push Server image
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
              IMAGE_URI=$ECR_REGISTRY/$ECR_SERVER_REPO:$IMAGE_TAG
              docker build -t $IMAGE_URI ./server
              docker push $IMAGE_URI
              echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

    deploy:
      needs: [build-client, build-server] # Waits for both builds
      runs-on: ubuntu-latest
      
      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Task Definition (Inject Images and Secrets)
        id: render-task-def
        env:
          CLIENT_IMAGE: ${{ needs.build-client.outputs.image }}
          SERVER_IMAGE: ${{ needs.build-server.outputs.image }}
        run: |
          # Install jq for JSON processing
          sudo apt-get install jq -y
          
          # Load the template
          TASK_DEF=$(cat ${{ env.ECS_TASK_DEF_PATH }})
          
          # Update Client Image
          TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$CLIENT_IMAGE" --arg NAME "$CONTAINER_NAME_CLIENT" \
            '.containerDefinitions[] |= if .name == $NAME then .image = $IMAGE else . end')

          # Update Server Image AND Inject Secrets into Server Environment
          TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "$SERVER_IMAGE" --arg NAME "$CONTAINER_NAME_SERVER" \
            --arg DB_URL "${{ secrets.DB_URL_SECRET }}" \
            --arg CLIENT_URL "${{ secrets.CLIENT_URL_VALUE }}" \
            --arg JWT_SECRET "${{ secrets.JWT_SECRET }}" \
            --arg GEMINI_KEY "${{ secrets.GEMINI_API_KEY_VALUE }}" \
            '.containerDefinitions[] |= if .name == $NAME then 
                .image = $IMAGE | 
                .environment |= map(
                  # Check for all five secrets 
                  if .name == "db_url" then .value = $DB_URL
                  elif .name == "CLIENT_URL" then .value = $CLIENT_URL
                  elif .name == "jwt_secret" then .value = $JWT_SECRET
                  elif .name == "GEMINI_API_KEY" then .value = $GEMINI_KEY
                  else . end
                )
             else . end')
          
          # Write the final task definition to a file
          echo "$TASK_DEF" > task-def-final.json
          echo "task-def-path=task-def-final.json" >> $GITHUB_OUTPUT

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-def-path }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true